name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - id: release
        # googleapis/release-please-action@v4.4.1
        uses: googleapis/release-please-action@5c625bfb5d1ff62eadeeb3772007f7f66fdcf071
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  notify-patinaproject-skills:
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch marketplace bump on patinaproject/skills
        # benc-uk/workflow-dispatch@v1.3.1
        uses: benc-uk/workflow-dispatch@7a027648b88c2413826b6ddd6c76114894dc5ec4
        with:
          token: ${{ secrets.PATINA_SKILLS_DISPATCH_TOKEN }}
          repo: patinaproject/skills
          workflow: bump-plugin-tags.yml
          inputs: |
            {
              "plugin": "${{ github.event.repository.name }}",
              "tag": "${{ needs.release-please.outputs.tag_name }}"
            }
