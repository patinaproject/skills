name: Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: write
  issues: write
  id-token: write

concurrency:
  group: code-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  classify:
    name: Classify PR
    runs-on: blacksmith-2vcpu-ubuntu-2404
    if: >-
      ${{
        github.event.pull_request.draft == false &&
        github.event.pull_request.head.repo.fork == false &&
        github.event.pull_request.user.login != 'dependabot[bot]'
      }}
    permissions:
      contents: read
      pull-requests: read
    outputs:
      should_review: ${{ steps.changed-files.outputs.should_review }}
      reason: ${{ steps.changed-files.outputs.reason }}
    steps:
      - name: Classify changed files
        id: changed-files
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail

          changed_files="$(gh api "repos/${REPOSITORY}/pulls/${PR_NUMBER}/files" --paginate --jq '.[].filename')"

          if printf '%s\n' "$changed_files" | grep -qx '.github/workflows/code-review.yml'; then
            {
              echo "should_review=false"
              echo "reason=review workflow changed"
            } >> "$GITHUB_OUTPUT"
            exit 0
          fi

          reviewable=false
          while IFS= read -r file; do
            case "$file" in
              ""|CHANGELOG.md|pnpm-lock.yaml|package-lock.json|yarn.lock|bun.lockb)
                ;;
              *.lock|*.lockb|*.snap|*.png|*.jpg|*.jpeg|*.gif|*.webp|*.svg)
                ;;
              *)
                reviewable=true
                ;;
            esac
          done <<< "$changed_files"

          if [ "$reviewable" = false ]; then
            {
              echo "should_review=false"
              echo "reason=only low-signal files changed"
            } >> "$GITHUB_OUTPUT"
            exit 0
          fi

          {
            echo "should_review=true"
            echo "reason=reviewable changes detected"
          } >> "$GITHUB_OUTPUT"

  review:
    name: Review PR
    needs: classify
    runs-on: blacksmith-2vcpu-ubuntu-2404
    timeout-minutes: 30
    if: needs.classify.outputs.should_review == 'true'
    env:
      PR_REPO: ${{ github.repository }}
      PR_NUMBER: ${{ github.event.pull_request.number }}
    steps:
      - name: Checkout repository
        # actions/checkout@v4.3.1
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 1

      - name: Run Code Review
        id: code-review
        # anthropics/claude-code-action@v1
        uses: anthropics/claude-code-action@11ba60486e4aec9ddfeafcf4bb3f00b028ac2c16
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          include_fix_links: false
          display_report: false
          show_full_output: false
          use_sticky_comment: true
          track_progress: true
          prompt: |
            NON-INTERACTIVE CI REVIEW for PR ${{ env.PR_NUMBER }} in ${{ env.PR_REPO }}.

            This review is non-mutating. Do not edit files, stage changes,
            commit changes, or push branches.

            ## Step 1: Load project context

            Read AGENTS.md, CLAUDE.md if present, and docs that govern changed
            files.

            ## Step 2: Get PR diff

            Run:
              gh pr view ${{ env.PR_NUMBER }}
              gh pr diff ${{ env.PR_NUMBER }}

            Store the diff for use in the review below.

            Skip these paths in all review passes:
            - CHANGELOG.md and release-please generated release metadata
            - pnpm-lock.yaml and other lock files
            - .agents/skills/** and .claude/skills/** dogfood overlay paths
            - generated marketplace output unless it reveals a concrete risk

            ## Step 3: Compute base and head SHAs

            Run:
              BASE_SHA=$(gh pr view ${{ env.PR_NUMBER }} --json baseRefOid --jq .baseRefOid)
              HEAD_SHA=$(gh pr view ${{ env.PR_NUMBER }} --json headRefOid --jq .headRefOid)

            ## Step 4: Primary review

            Apply the repository code-review rubric to the diff
            (BASE_SHA..HEAD_SHA). Preserve exact functionality. Never ask for a
            refactor that changes what the code does unless the current behavior
            is a bug.

            **Correctness and security:**
            - Does the implementation match the issue intent?
            - Are GitHub Actions permissions, pinned action SHAs, and secret
              boundaries safe?
            - Does the change introduce credential leaks, public-repo private
              context leaks, or unsafe automation?

            **Structural code quality — Thermo-Nuclear Code Quality Review
            lens:**

            Apply this lens to every changed file, then surface what you find
            as advisory findings. This review is non-mutating: where the lens
            says "go for it" or "restructure", recommend the restructuring,
            do not perform it.

            - Ambitious behavior-preserving simplification ("code-judo"). Look
              past the first version that works for the simplest version that
              could work. Favor changes that delete whole branches, collapse
              redundant helper layers, or remove a special case outright over
              changes that add another. When a diff could be dramatically
              simpler while preserving exact behavior, say so.
            - File-size sprawl. Treat a file growing toward ~1000 lines as a
              smell, not a hard limit. When a change pushes a file past a
              healthy size boundary or piles new responsibilities onto an
              already-large file, recommend decomposing it along its natural
              seams.
            - Spaghetti and branch growth. Be suspicious of new ad-hoc
              conditionals bolted onto an unrelated flow. New logic should land
              behind a proper abstraction or in its own path, not as another
              branch tangled into a function that already does something else.
            - Abstraction and type-boundary cleanliness. Question leaky
              abstractions, thin pass-through wrappers, and unnecessary casts or
              optionality. Prefer direct, legible code over indirection that
              hides what is happening or widens a type boundary without reason.
            - Canonical-layer reuse. Push feature logic into the canonical layer
              and reuse existing helpers instead of accreting near-duplicate
              one-offs. When a change reimplements something the repo already
              provides, point to the canonical home.
            - Atomic-update preference. Prefer changes that move state forward
              in one coherent, all-or-nothing step over changes that leave an
              intermediate, half-applied state observable.

            **Maintainability:**
            - Reduce unnecessary complexity and nesting.
            - Eliminate redundant wording, stale workflow names, and unclear
              skill instructions.
            - Preserve repository conventions for skills, marketplace manifests,
              issue-linked commits, and PR templates.

            **Testing:**
            - Are changed workflow contracts covered by verification scripts?
            - Are changed skill behaviors verified through discoverability,
              marketplace, lint, or focused workflow checks?
            - Do tests verify observable behavior rather than implementation
              trivia?

            Categorize findings as:
            - **Critical (Must Fix):** Bugs, security issues, credential leaks,
              broken workflows, or data loss risks
            - **Major (Should Fix):** Missing verification, unsafe permissions,
              unclear contracts, or likely agent workflow regressions
            - **Minor (Nice to Have):** Style, wording, or documentation polish

            ## Step 5: Consolidate and report findings

            Merge all findings. Deduplicate overlapping findings.
            Do NOT duplicate output from CI lint/test pipelines.
            Do not edit files, stage changes, commit changes, or push branches.
            Do not create standalone PR summary comments. The Claude Code
            action owns the single action-managed sticky comment.

            Post all actionable line-specific findings inline using
            mcp__github_inline_comment__create_inline_comment with
            confirmed: true whenever the finding has a valid diff location.
            Each inline finding must include:
            - The severity label (C1:, M1:, M2:, etc.)
            - A clear description of the issue
            - A concrete suggested fix

            Return one final Markdown review summary for the action-managed
            sticky comment. Keep the sticky summary concise: include review
            context, affected areas, risk, finding counts, and brief notes for
            findings that cannot be placed inline. Do not fully duplicate
            inline finding details in the sticky summary.

            Use this structure for the final sticky summary:

            ## Code Review

            ### Change Walkthrough
            [Brief description per file or area changed]

            ### Affected Areas
            [List of skill, workflow, marketplace, or docs areas touched]

            ### Risk: [Low/Medium/High]
            [One sentence reasoning]

            ### Findings
            - Critical: [N]
            - Major: [N]
            - Minor: [N]

            [Briefly note where detailed findings were posted inline. Include
            only summary-only notes for findings that could not be attached to
            a diff line.]

            ## Important comment formatting rules

            - NEVER write '#' followed by a number (for example, '#1' or '#2');
              GitHub auto-links these to issues and PRs.
            - Use C1:, M1:, and L1: style labels instead.
            - Keep findings concise and actionable.
            - This repository is public. Do not print, summarize, infer, or
              request secrets, credentials, token values, private repository
              URLs, private paths, or private context.
          claude_args: |
            --model claude-opus-4-8
            --effort high
            --max-turns 100
            --allowedTools Read,mcp__github_inline_comment__create_inline_comment,Bash(gh pr diff:*),Bash(gh pr view:*),Bash(git diff:*)
            --append-system-prompt "CI NON-INTERACTIVE MODE: Do not prompt for human confirmation. Proceed through the review steps automatically and report findings using only the allowed tools."
