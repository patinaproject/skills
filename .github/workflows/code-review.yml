name: Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  classify:
    name: Check if review is needed
    runs-on: blacksmith-2vcpu-ubuntu-2404
    if: >-
      ${{
        github.event.pull_request.draft == false &&
        github.event.pull_request.head.repo.fork == false
      }}
    permissions:
      contents: read
    outputs:
      should-review: ${{ steps.changed-files.outputs.should-review }}
    steps:
      - name: Checkout repository
        # actions/checkout@v4.3.1
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0

      - name: Classify changed files
        id: changed-files
        env:
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PR_HEAD_REF: ${{ github.event.pull_request.head.ref }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
        run: |
          set -euo pipefail

          if [[ "$PR_HEAD_REF" == release-please--* && "$PR_AUTHOR" == "github-actions[bot]" ]]; then
            echo "Skipping Code Review: release-please"
            echo "should-review=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ "$PR_AUTHOR" == "dependabot[bot]" ]]; then
            echo "Skipping Code Review: dependabot"
            echo "should-review=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if git log --name-only --format= "$PR_BASE_SHA..$PR_HEAD_SHA" -- .github/workflows/code-review.yml > reviewer-workflow-edits.txt; then
            :
          else
            echo "Failed to inspect PR commit history for reviewer workflow edits" >&2
            exit 1
          fi

          # The action's token exchange requires this workflow to match the default
          # branch. If the PR branch committed a change to this workflow, skip
          # the action and rely on local/manual review evidence for the PR.
          if grep -Fxq ".github/workflows/code-review.yml" reviewer-workflow-edits.txt; then
            echo "Skipping Code Review: reviewer-workflow-self-edit"
            echo "should-review=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          mapfile -t files < <(git diff --name-only "$PR_BASE_SHA..$PR_HEAD_SHA")
          if [[ "${#files[@]}" -eq 0 ]]; then
            echo "Skipping Code Review: empty-diff"
            echo "should-review=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "should-review=true" >> "$GITHUB_OUTPUT"

  code-review:
    name: Review PR
    needs: classify
    if: ${{ needs.classify.outputs.should-review == 'true' }}
    runs-on: blacksmith-2vcpu-ubuntu-2404
    timeout-minutes: 45
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write

    env:
      PR_REPO: ${{ github.repository }}
      PR_NUMBER: ${{ github.event.pull_request.number }}

    steps:
      - name: Checkout repository
        # actions/checkout@v4.3.1
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0

      - name: Run Code Review
        id: code-review
        # anthropics/claude-code-action@v1.0.133
        uses: anthropics/claude-code-action@787c5a0ce96a9a6cfb050ea0c8f4c05f2447c251
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          use_commit_signing: true
          track_progress: true
          use_sticky_comment: true
          allowed_bots: 'claude'

          # Delegate to the vendored `code-review` skill; the prompt supplies only
          # the CI-forced inputs and output contract, never a rubric of its own.
          prompt: |
            NON-INTERACTIVE CI REVIEW for PR ${{ env.PR_NUMBER }} in ${{ env.PR_REPO }}.

            Review this PR's diff by invoking the code-review skill through the Skill tool. It runs a two-axis review -- Standards (does the diff follow this repo's documented coding standards, plus the fixed Fowler code-smell baseline the skill carries) and Spec (does the diff match the originating issue) -- in two parallel sub-agents, then reports them side by side. The skill owns the rubric. Apply the CI-forced inputs and overrides below, which supply what the skill would otherwise ask a human for and take precedence over its interactive defaults.

            ## CI-forced inputs and overrides

            1. NON-INTERACTIVE: There is no human to talk to. Never wait for confirmation or direction. Wherever the skill would ask the user for the fixed point, spec source, or standards sources, use the values below instead.
            2. FIXED POINT: the PR base. Diff against the three-dot merge-base with `gh pr diff ${{ env.PR_NUMBER }}` (equivalently `git diff origin/${{ github.event.pull_request.base.ref }}...HEAD`), and read the PR with `gh pr view ${{ env.PR_NUMBER }}`. Treat that diff as the change under review. Read AGENTS.md and CLAUDE.md (plus any docs they import) for project context.
            3. SPEC SOURCE: the issue this PR closes, resolved from the PR body's closing keyword (Closes/Fixes/Resolves) and fetched with `gh issue view <N>`. If the PR closes no issue, the Spec axis reports "no spec available" per the skill's own rule -- do not invent a spec.
            4. SKIP PATHS: do not review CHANGELOG.md or release-please release metadata, pnpm-lock.yaml or any other lock files, the committed skill overlay trees (.agents/skills/** and .claude/skills/**), or generated marketplace output.
            5. NO CI REPORTING: Do not inspect, summarize, or report CI/check failures -- CI jobs are the source of truth for lint, test, and workflow failures.

            ## Output contract

            This review is advisory and non-mutating. Produce findings only. Do not edit files, stage changes, commit changes, or push branches. A completed review is an advisory completed check even when blocking findings exist; do not fail the workflow because findings exist.

            Post every finding that maps to a specific line of the diff as its own inline comment using mcp__github_inline_comment__create_inline_comment with `confirmed: true` on that line -- one inline comment per finding. Prefix each inline comment with its axis and index: `ST<n>:` for a Standards finding, `SP<n>:` for a Spec finding (for example `ST1:` or `SP2:`). Only findings that do not map to a specific line (cross-cutting or whole-PR concerns) may live in the summary alone. Do not call `gh pr comment` or create any standalone PR summary comment. Never write '#' immediately followed by a number (GitHub auto-links it to issues/PRs); use the ST/SP labels instead.

            End with one concise Markdown summary for the action-managed sticky comment, structured as two separate sections -- `## Standards` and `## Spec` -- that are never merged or reranked across axes. Report the two axes side by side exactly as the skill produces them.

          claude_args: |
            --max-turns 100
            --model claude-opus-4-8
            --effort high
            --allowedTools Skill(code-review),Task,Read,Glob,Grep,mcp__github_inline_comment__create_inline_comment,Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh issue view:*),Bash(git diff:*),Bash(git log:*),Bash(git rev-parse:*)
            --append-system-prompt "CI NON-INTERACTIVE MODE: Never wait for human confirmation or approval. Proceed autonomously through every step to completion."
