name: Verify

on:
  pull_request:
    paths:
      - "skills/**"
      - "scripts/**"
      - ".agents/skills/**"
      - ".claude/skills/**"
      - ".claude-plugin/**"

permissions:
  contents: read

jobs:
  verify:
    name: Verify skill overlay
    runs-on: ubuntu-latest
    steps:
      # actions/checkout@v4.3.1
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      # actions/setup-node@v4.4.0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "24"

      - name: Install dependencies
        run: npm_config_ignore_scripts=true npx -y pnpm@10 install --frozen-lockfile

      # Check b: scaffold-repository apply, no network (exit 0)
      - name: "Check b — apply-scaffold-repository.js exits 0 (no-network)"
        run: node scripts/apply-scaffold-repository.js skills/scaffold-repository --check

      # Check c: dogfood verification covers all five skills
      - name: "Check c — verify-dogfood.sh exits 0 (all five skills)"
        run: bash scripts/verify-dogfood.sh

      # Check marketplace catalog validity
      - name: "verify-marketplace.sh exits 0 (catalog validated)"
        run: bash scripts/verify-marketplace.sh

      # Check a (representative sample): CLI resolves skills from local paths
      # Using local path sources because the branch may not be published to
      # remote at CI time. Post-merge, consumers use:
      #   npm_config_ignore_scripts=true npx skills@1.5.6 \
      #     add patinaproject/skills@<name> --agent claude-code -y
      # The local-path form proves the SKILL.md shape is CLI-compatible.
      - name: "Check a — CLI resolves scaffold-repository from local path (must exit 0)"
        run: |
          npm_config_ignore_scripts=true npx skills@1.5.6 \
            add ./skills/scaffold-repository --list
          echo "exit=$?"

      - name: "Check a — CLI resolves office-hours from local path (must exit 0)"
        run: |
          npm_config_ignore_scripts=true npx skills@1.5.6 \
            add ./skills/office-hours --list
          echo "exit=$?"
