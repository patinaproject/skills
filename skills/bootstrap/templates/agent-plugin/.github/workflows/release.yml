name: Release

# Triggered only when (a) a maintainer manually dispatches the workflow to
# open or refresh the standing release PR, or (b) a release-please-managed
# PR (label `autorelease: pending`) is merged — the second event auto-cuts
# the tag and publishes the release. Regular PR merges do NOT trigger this
# workflow. See RELEASING.md.
on:
  workflow_dispatch:
  pull_request:
    types: [closed]
    branches: [main]

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release-please:
    # On `pull_request: closed`, only run when the PR was actually merged AND
    # carries the `autorelease: pending` label that release-please attaches
    # to its standing release PR. This skips the job for regular feature/fix
    # PR merges, so no Release workflow run shows up against them. The job
    # always runs on `workflow_dispatch`.
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event.pull_request.merged == true &&
       contains(github.event.pull_request.labels.*.name, 'autorelease: pending'))
    runs-on: ubuntu-latest
    # Declared at both workflow and job level. The workflow-level block is the
    # upper bound for any job; the job-level block is what the runner actually
    # presents to GitHub when release-please calls POST /repos/.../releases.
    # Some org policies cap the workflow default below the workflow-level
    # declaration, so setting job-level permissions explicitly removes the
    # ambiguity that caused issue #18. `issues: write` is required because PR
    # labels are on the Issues API: release-please relabels the release PR from
    # `autorelease: pending` to `autorelease: tagged` as part of release
    # creation, and without this scope the whole step 403s.
    permissions:
      contents: write
      issues: write
      pull-requests: write
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - id: release
        # googleapis/release-please-action@v4.4.1
        uses: googleapis/release-please-action@5c625bfb5d1ff62eadeeb3772007f7f66fdcf071
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
